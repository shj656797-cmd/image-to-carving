<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片转雕刻图 - 专业图像处理工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>🎨 图片转雕刻图</h1>
            <p>将您的图片转换为精美的雕刻效果</p>
        </header>

        <!-- 主容器 -->
        <main class="main-content">
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h2>上传图片</h2>
                    <p>拖拽图片到此或点击选择文件</p>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                </div>
            </div>

            <div class="content-grid">
                <!-- 原始图片预览 -->
                <div class="preview-section">
                    <h3>原始图片</h3>
                    <div class="preview-container">
                        <canvas id="originalCanvas"></canvas>
                        <div id="originalPlaceholder" class="placeholder">等待上传图片...</div>
                    </div>
                </div>

                <!-- 效果选择和预览 -->
                <div class="preview-section">
                    <h3>处理效果</h3>
                    <div class="control-panel">
                        <!-- 效果选择 -->
                        <div class="control-group">
                            <label for="effectType">选择效果：</label>
                            <select id="effectType">
                                <option value="grayscale">灰度图</option>
                                <option value="emboss">浮雕效果</option>
                                <option value="woodcarving">木雕纹理</option>
                                <option value="edge">边缘检测</option>
                            </select>
                        </div>

                        <!-- 强度调整 -->
                        <div class="control-group">
                            <label for="intensitySlider">处理强度：</label>
                            <div class="slider-container">
                                <input type="range" id="intensitySlider" min="0.1" max="2" step="0.1" value="1">
                                <span id="intensityValue">1.0</span>
                            </div>
                        </div>

                        <!-- 其他参数 -->
                        <div class="control-group" id="additionalControls"></div>

                        <!-- 按钮组 -->
                        <div class="button-group">
                            <button id="processBtn" class="btn btn-primary" disabled>处理图片</button>
                            <button id="downloadBtn" class="btn btn-secondary" disabled>下载图片</button>
                            <button id="resetBtn" class="btn btn-reset">重置</button>
                        </div>
                    </div>

                    <!-- 处理结果预览 -->
                    <div class="preview-container">
                        <canvas id="processedCanvas"></canvas>
                        <div id="processedPlaceholder" class="placeholder">点击"处理图片"查看效果...</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 处理状态提示 -->
        <div id="statusBar" class="status-bar" style="display: none;">
            <span id="statusText">处理中...</span>
        </div>
    </div>

    <!-- 引入图像处理库 -->
    <script src="image-processor.js"></script>
    <!-- 引入主应用脚本 -->
    <script src="script.js"></script>
</body>
</html>
